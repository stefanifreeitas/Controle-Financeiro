<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyFinance Premium - Controle Multianual</title>
    <style>
        :root {
            --primary: #203764; --secondary: #3a5a94; --bg: #f0f2f5;
            --receita: #27ae60; --gasto: #e74c3c; --accent: #ffc000;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }

        /* AUTH */
        .auth-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--primary); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: white; padding: 25px; border-radius: 15px; width: 85%; max-width: 350px; }

        /* HEADER */
        .header { background: var(--primary); color: white; padding: 15px; position: sticky; top: 0; z-index: 1000; }
        .header-top { display: flex; justify-content: space-between; align-items: center; gap: 5px; margin-bottom: 10px; }
        .nav-tabs { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .tab-btn { background: rgba(255,255,255,0.1); color: white; border: none; padding: 10px 18px; border-radius: 5px; font-weight: bold; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { background: white; color: var(--primary); }
        .btn-top { background: var(--accent); border: none; padding: 8px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 10px; flex: 1; }

        /* CARDS & TABLES */
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card-input { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; border-left: 5px solid var(--accent); }
        .admin-panel { display: none; background: white; padding: 15px; border-radius: 12px; margin: 15px; border: 2px solid var(--accent); }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        .btn-launch { background: var(--primary); color: white; border: none; width: 100%; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .month-card { background: white; border-radius: 10px; margin-bottom: 20px; overflow: hidden; border: 1px solid #ddd; }
        .month-title { padding: 10px; text-align: center; font-weight: bold; color: #333; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
        .col-val { text-align: right; font-weight: bold; font-family: monospace; }
        
        .btn-status { font-size: 9px; padding: 5px; border-radius: 4px; border: 1px solid #ccc; background: white; cursor: pointer; }
        .pago { background: var(--receita) !important; color: white; border: none; }
        .edit-btn { cursor: pointer; opacity: 0.5; margin-right: 5px; }

        /* CORES MESES */
        .bg-JAN { background: #d9d9d9; } .bg-FEV { background: #d9e2f3; } .bg-MAR { background: #fce4d6; }
        .bg-ABR { background: #e2efda; } .bg-MAI { background: #fff2cc; } .bg-JUN { background: #d0cece; }
        .bg-JUL { background: #daeef3; } .bg-AGO { background: #ffffcc; } .bg-SET { background: #e2f0d9; }
        .bg-OUT { background: #fbe5d6; } .bg-NOV { background: #deebf7; } .bg-DEZ { background: #fff2cc; }
    </style>
</head>
<body>

    <div id="login-screen" class="auth-screen">
        <div class="auth-box">
            <h2 style="text-align:center; color:var(--primary)">MyFinance Login</h2>
            <input type="email" id="login-email" placeholder="E-mail">
            <input type="password" id="login-pass" placeholder="Senha">
            <button class="btn-launch" onclick="doLogin()">ENTRAR</button>
        </div>
    </div>

    <div id="app-content" style="display:none">
        <div class="header">
            <div class="header-top">
                <button class="btn-top" onclick="togglePanel('panel-rec')">💰 MINHAS RECEITAS</button>
                <button class="btn-top" style="background:white" onclick="togglePanel('panel-p')">👥 PESSOAS</button>
                <div style="display:flex; flex-direction:column; align-items:center;">
                    <small style="font-size:9px">VER ANO:</small>
                    <select id="view-year" style="width:70px; padding:3px; margin:0; font-size:11px;" onchange="renderMonths()"></select>
                </div>
                <button onclick="location.reload()" style="background:red; border:none; color:white; border-radius:4px; font-size:10px; cursor:pointer; padding:5px">Sair</button>
            </div>
            <div class="nav-tabs" id="profile-tabs"></div>
        </div>

        <div id="panel-p" class="admin-panel">
            <h4>Pessoas</h4>
            <input type="text" id="new-p-name" placeholder="Nome da pessoa">
            <button class="btn-launch" onclick="addProfile()">CRIAR PERFIL</button>
            <div id="profiles-list" style="margin-top:10px"></div>
        </div>

        <div id="panel-rec" class="admin-panel">
            <h4>Minha Receita Mensal</h4>
            <input type="text" id="rec-desc" placeholder="Ex: Salário">
            <input type="number" id="rec-val" placeholder="Valor R$">
            <p style="font-size:10px">Ano da receita:</p>
            <select id="rec-year"></select>
            <button class="btn-launch" style="background:var(--receita)" onclick="addFixed('receita')">SALVAR RECEITA</button>
        </div>

        <div class="container">
            <div class="card-input">
                <h3 id="current-p-title" style="margin:0">MEUS GASTOS</h3>
                
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div>
                        <label style="font-size:11px">Mês de Início:</label>
                        <select id="in-m"></select>
                    </div>
                    <div>
                        <label style="font-size:11px">Ano de Início:</label>
                        <select id="in-yr"></select>
                    </div>
                </div>

                <input type="text" id="in-desc" placeholder="Descrição (Ex: Notebook)">
                <input type="number" id="in-val" placeholder="Valor R$">
                
                <div style="background: #f9f9f9; padding: 10px; border-radius: 8px; margin: 10px 0; border: 1px solid #eee;">
                    <label style="font-size: 12px; font-weight: bold;">Forma de Pagamento:</label>
                    <select id="in-type" onchange="document.getElementById('parcela-fim-div').style.display = this.value === 'parcela' ? 'grid' : 'none'">
                        <option value="variavel">Gasto Único (Só este mês/ano)</option>
                        <option value="parcela">Parcelado (Vários meses/anos)</option>
                    </select>
                    
                    <div id="parcela-fim-div" style="display:none; grid-template-columns: 1fr 1fr; gap: 10px; margin-top:10px; padding-top:10px; border-top:1px dashed #ccc">
                        <div>
                            <label style="font-size: 11px;">Mês Final:</label>
                            <select id="in-end-m"></select>
                        </div>
                        <div>
                            <label style="font-size: 11px;">Ano Final:</label>
                            <select id="in-end-yr"></select>
                        </div>
                    </div>
                </div>

                <button class="btn-launch" onclick="addExpense()">LANÇAR GASTO</button>
            </div>

            <div id="months-container"></div>
        </div>
    </div>

    <script>
        const months = ["JAN", "FEV", "MAR", "ABR", "MAI", "JUN", "JUL", "AGO", "SET", "OUT", "NOV", "DEZ"];
        let db = { profiles: {"MEUS GASTOS": []}, fixedReceitas: [], pagamentos: {} };
        let activeProfile = "MEUS GASTOS";
        let currentUserEmail = "";

        function doLogin() {
            const email = document.getElementById('login-email').value.toLowerCase();
            if(!email) return;
            currentUserEmail = email;
            const saved = localStorage.getItem('user_v2_' + email);
            if(saved) db = JSON.parse(saved);
            startApp();
        }

        function startApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            
            // Popular Selects de Anos
            let yOpt = ""; for(let y=2026; y<=2050; y++) yOpt += `<option value="${y}">${y}</option>`;
            document.getElementById('view-year').innerHTML = yOpt;
            document.getElementById('in-yr').innerHTML = yOpt;
            document.getElementById('in-end-yr').innerHTML = yOpt;
            document.getElementById('rec-year').innerHTML = yOpt;
            
            document.getElementById('in-m').innerHTML = months.map(m => `<option value="${m}">${m}</option>`).join('');
            document.getElementById('in-end-m').innerHTML = months.map(m => `<option value="${m}">${m}</option>`).join('');
            
            renderTabs();
            renderMonths();
            renderProfilesList();
        }

        function addExpense() {
            const startM = document.getElementById('in-m').value;
            const startY = parseInt(document.getElementById('in-yr').value);
            const desc = document.getElementById('in-desc').value;
            const val = parseFloat(document.getElementById('in-val').value);
            const type = document.getElementById('in-type').value;
            
            let endM = startM;
            let endY = startY;

            if(type === 'parcela') {
                endM = document.getElementById('in-end-m').value;
                endY = parseInt(document.getElementById('in-end-yr').value);
            }

            if(!desc || isNaN(val)) return alert("Preencha descrição e valor!");
            
            // Validação de data
            if(endY < startY || (endY === startY && months.indexOf(endM) < months.indexOf(startM))) {
                return alert("A data final não pode ser anterior à data de início!");
            }

            if(!db.profiles[activeProfile]) db.profiles[activeProfile] = [];
            
            db.profiles[activeProfile].push({
                id: Date.now(),
                desc, val, startM, startY, endM, endY, type
            });

            save(); renderMonths();
            document.getElementById('in-desc').value = ''; document.getElementById('in-val').value = '';
        }

        function addFixed(mode) {
            const yr = document.getElementById('rec-year').value;
            const d = document.getElementById('rec-desc').value;
            const v = parseFloat(document.getElementById('rec-val').value);
            db.fixedReceitas.push({ id: Date.now(), desc: d, val: v, year: yr });
            save(); renderMonths(); togglePanel('panel-rec');
        }

        function renderMonths() {
            const viewY = parseInt(document.getElementById('view-year').value);
            const container = document.getElementById('months-container');
            container.innerHTML = '';

            months.forEach((m, mIdx) => {
                const expenses = db.profiles[activeProfile] || [];
                
                // Lógica de filtro temporal (Vê se o mês/ano atual está entre o início e fim do gasto)
                const visible = expenses.filter(e => {
                    const startTotal = (e.startY * 12) + months.indexOf(e.startM);
                    const endTotal = (e.endY * 12) + months.indexOf(e.endM);
                    const currentTotal = (viewY * 12) + mIdx;
                    return currentTotal >= startTotal && currentTotal <= endTotal;
                });

                const fR = (activeProfile === "MEUS GASTOS") ? db.fixedReceitas.filter(r => r.year == viewY) : [];

                let tRec = 0, tGas = 0;
                let rows = fR.map(r => {
                    const payKey = `${viewY}_${m}_${r.id}`;
                    const isP = db.pagamentos[payKey];
                    if(isP) tRec += r.val;
                    return `<tr style="color:green; background:#fafffa"><td>${r.desc}</td><td class="col-val">R$ ${r.val.toFixed(2)} <button class="btn-status ${isP?'pago':''}" onclick="toggleS('${payKey}')">${isP?'✔':'OK'}</button></td></tr>`;
                }).join('');

                rows += visible.map(e => {
                    const payKey = `${viewY}_${m}_${e.id}`;
                    const isP = db.pagamentos[payKey];
                    if(!isP) tGas += e.val;
                    const tag = e.type === 'parcela' ? `<small style="color:blue">[P]</small> ` : '';
                    return `<tr><td><span class="edit-btn" onclick="deleteExpense(${e.id})">🗑️</span>${tag}${e.desc}</td><td class="col-val"><span style="${isP?'text-decoration:line-through; opacity:0.5':''}">R$ ${e.val.toFixed(2)}</span> <button class="btn-status ${isP?'pago':''}" onclick="toggleS('${payKey}')">${isP?'✔':'PAGAR'}</button></td></tr>`;
                }).join('');

                container.innerHTML += `
                    <div class="month-card">
                        <div class="month-title bg-${m}">${m} / ${viewY}</div>
                        <table>${rows || '<tr><td colspan="2" style="text-align:center;padding:10px;color:#999">Nenhum lançamento</td></tr>'}</table>
                        <div style="padding:10px; font-size:12px; border-top:1px solid #eee">
                            <div style="color:green"><b>RECEBIDO:</b> R$ ${tRec.toFixed(2)}</div>
                            <div style="color:red"><b>A PAGAR:</b> R$ ${tGas.toFixed(2)}</div>
                            <div style="margin-top:5px; font-weight:bold; border-top:1px dashed #ccc">SOBRA: R$ ${(tRec - tGas).toFixed(2)}</div>
                        </div>
                    </div>`;
            });
        }

        function toggleS(key) { db.pagamentos[key] = !db.pagamentos[key]; save(); renderMonths(); }
        
        function deleteExpense(id) { 
            if(confirm("Excluir este gasto de todos os meses?")) {
                db.profiles[activeProfile] = db.profiles[activeProfile].filter(e => e.id !== id);
                save(); renderMonths();
            }
        }

        function addProfile() {
            const n = document.getElementById('new-p-name').value.toUpperCase().trim();
            if(n && !db.profiles[n]) { db.profiles[n] = []; save(); renderTabs(); renderProfilesList(); }
        }

        function renderProfilesList() {
            document.getElementById('profiles-list').innerHTML = Object.keys(db.profiles).map(n => `
                <div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #eee">
                    <span>${n}</span>
                    <button onclick="deleteProfile('${n}')" style="border:none; background:none; cursor:pointer">🗑️</button>
                </div>
            `).join('');
        }

        function deleteProfile(n) { if(n !== "MEUS GASTOS" && confirm("Excluir perfil?")) { delete db.profiles[n]; save(); renderTabs(); renderProfilesList(); } }

        function renderTabs() {
            document.getElementById('profile-tabs').innerHTML = Object.keys(db.profiles).map(n => `
                <button class="tab-btn ${n === activeProfile ? 'active' : ''}" onclick="activeProfile='${n}'; document.getElementById('current-p-title').innerText='${n}'; renderMonths(); renderTabs();">${n}</button>
            `).join('');
        }

        function togglePanel(id) { const p = document.getElementById(id); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }
        function save() { localStorage.setItem('user_v2_' + currentUserEmail, JSON.stringify(db)); }
    </script>
</body>
</html>
